<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Nhúng thư viện A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Nhúng thư viện Mind-AR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!-- 
      Cấu hình Mind-AR: 
      imageTargetSrc: Đường dẫn tới file targets.mind của bạn 
    -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- Khai báo model 3D -->
        <a-asset-item id="myModel" src="./model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 
        Target Index: 0 tương ứng với ảnh đầu tiên bạn upload khi tạo file .mind
      -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Hiển thị mô hình 3D lên trên ảnh nhận dạng -->
        <a-gltf-model src="#myModel" scale="200 200 200" position="0 0 0"></a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
